server {
    listen 80;
    server_name _;

    # ======================
    # FRONTEND
    # ======================
    root /var/www/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # ======================
    # API (PHP)
    # ======================
    location ~ \.php$ {
        root /var/www/html;  # 👈 backend

        fastcgi_pass php:9000;  # Usamos el nombre del contenedor PHP como 'php' o 'almacen-php'
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
    }

    # ======================
    # PHP directo (por si acaso)
    # ======================
    # Aquí no es necesario otro bloque de PHP, podemos eliminarlo para evitar conflicto.
}