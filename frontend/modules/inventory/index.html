<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white hidden">

<div class="flex">

    <!-- SIDEBAR -->
    <div id="sidebar"></div>

    <!-- CONTENT -->
    <main class="flex-1 p-6">

        <!-- HEADER -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-semibold">Inventario</h1>

            <div class="flex gap-3">
                <button id="btnCreate"
                    class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg">
                    + Nuevo producto
                </button>

                <button onclick="generatePDF()"
                    class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-md">
                    📄 Generar catálogo
                </button>
            </div>
        </div>

        <!-- SEARCH -->
    <div class="flex justify-between items-center mb-4">

        <input id="searchInput"
            type="text"
            placeholder="Buscar producto..."
            class="w-full max-w-md p-2 rounded bg-gray-800 border border-gray-700">

        <div class="flex items-center gap-2 text-sm">
            <span class="text-gray-400">Mostrar:</span>

            <select id="limitSelect"
                class="bg-gray-800 border border-gray-700 rounded px-2 py-1">
                <option value="10">10</option>
                <option value="15">15</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>

    </div>

        <!-- TABLE -->
        <div class="bg-gray-900 rounded-xl overflow-hidden border border-gray-800">

            <table class="w-full text-left">
                <thead class="bg-gray-800 text-gray-400 text-sm">
                    <tr>
                        <th class="p-3 cursor-pointer" onclick="sortBy('name')">
                            Nombre <span id="sort-name"></span>
                        </th>
                        <th class="p-3 cursor-pointer" onclick="sortBy('sku')">
                            SKU <span id="sort-sku"></span>
                        </th>
                        <th class="p-3 cursor-pointer" onclick="sortBy('type')">
                            Tipo <span id="sort-type"></span>
                        </th>
                        <th class="p-3 cursor-pointer" onclick="sortBy('unit')">
                            Unidad <span id="sort-unit"></span>
                        </th>
                        <th class="p-3 cursor-pointer" onclick="sortBy('stock')">
                            Stock <span id="sort-stock"></span>
                        </th>
                        <th class="p-3">Descripción</th>
                        <th class="p-3 text-right">Acciones</th>
                    </tr>
                </thead>

                <tbody id="inventoryTable"></tbody>

            </table>

            <!-- PAGINATION -->
            <div id="pagination" class="flex justify-center p-4 space-x-2"></div>
            <div class="flex justify-center items-center gap-3 pb-4 text-sm">

    <span class="text-gray-400">Ir a página:</span>

    <input id="goToPage"
        type="number"
        min="1"
        class="w-20 p-1 rounded bg-gray-800 border border-gray-700 text-center">

    <button id="goToPageBtn"
        class="px-2 py-1 bg-blue-600 rounded hover:bg-blue-500">
        Ir
    </button>

</div>

        </div>

    </main>

</div>

<!-- ========================= -->
<!-- MODAL PRODUCTO -->
<!-- ========================= -->
<div id="productModal"
     class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">

    <div class="bg-gray-900 w-full max-w-lg rounded-xl p-6 border border-gray-800">

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold">Producto</h2>
            <button id="closeModal" class="text-gray-400 hover:text-white">✖</button>
        </div>

        <form id="productForm" class="space-y-4">

            <div>
                <label class="text-sm text-gray-400">Nombre</label>
                <input name="name" required
                    class="w-full mt-1 p-2 rounded bg-gray-800 border border-gray-700">
            </div>

            <div>
                <label class="text-sm text-gray-400">SKU</label>
                <input name="sku" required
                    class="w-full mt-1 p-2 rounded bg-gray-800 border border-gray-700">
            </div>

            <div>
                <label class="text-sm text-gray-400">Cantidad</label>
                <input type="number" name="stock" required min="0"
                    class="w-full mt-1 p-2 rounded bg-gray-800 border border-gray-700">
            </div>

            <div>
                <label class="text-sm text-gray-400">Tipo</label>
                <select name="type"
                    class="w-full mt-1 p-2 rounded bg-gray-800 border border-gray-700">
                    <option value="1">ALMACENABLE</option>
                    <option value="2">CONSUMIBLE</option>
                    <option value="3">SERVICIO</option>
                </select>
            </div>

            <div>
                <label class="text-sm text-gray-400">Unidad</label>
                <select name="unit"
                    class="w-full mt-1 p-2 rounded bg-gray-800 border border-gray-700">

                    <option value="1">PZA</option>
                    <option value="2">L</option>
                    <option value="3">M</option>
                    <option value="4">KG</option>
                    <option value="5">PAR</option>
                    <option value="6">KIT</option>
                    <option value="7">CUB</option>
                    <option value="8">CJ</option>

                </select>
            </div>

            <div>
                <label class="text-sm text-gray-400">Descripción</label>
                <textarea name="description" rows="3"
                    class="w-full mt-1 p-2 rounded bg-gray-800 border border-gray-700"></textarea>
            </div>

            <div class="flex justify-end gap-3 pt-4">
                <button type="button" id="cancelBtn"
                    class="px-4 py-2 bg-gray-700 rounded-lg">
                    Cancelar
                </button>

                <button type="submit"
                    class="px-4 py-2 bg-blue-600 rounded-lg">
                    Guardar
                </button>
            </div>

        </form>

    </div>
</div>

<!-- ========================= -->
<!-- MODAL CONFIG -->
<!-- ========================= -->
<div id="configModal"
     class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">

    <div class="bg-gray-900 w-full max-w-sm rounded-xl p-6 border border-gray-800">

        <h2 class="text-lg font-semibold mb-4">Configurar niveles</h2>

        <form id="configForm" class="space-y-4">

            <input type="hidden" name="id">

            <div>
                <label class="text-sm text-gray-400">Stock mínimo</label>
                <input type="number" name="min_stock"
                    class="w-full mt-1 p-2 rounded bg-gray-800 border border-gray-700">
            </div>

            <div>
                <label class="text-sm text-gray-400">Stock máximo</label>
                <input type="number" name="max_stock"
                    class="w-full mt-1 p-2 rounded bg-gray-800 border border-gray-700">
            </div>

            <div class="flex justify-end gap-3 pt-4">
                <button type="button" id="closeConfigBtn"
                    class="px-3 py-1 bg-gray-700 rounded">
                    Cancelar
                </button>

                <button type="submit"
                    class="px-3 py-1 bg-blue-600 rounded">
                    Guardar
                </button>
            </div>

        </form>
    </div>
</div>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script>

<!-- AUTH -->
<script type="module">
    import { checkAuth, setupLogout } from "/assets/js/core/auth.js";
    import { renderSidebar } from "/assets/js/components/sidebar.js";

    document.addEventListener("DOMContentLoaded", async () => {
        await checkAuth();

        document.getElementById("sidebar").innerHTML = renderSidebar("inventory");

        setupLogout();

        document.body.classList.remove("hidden");
    });
</script>

<!-- MAIN JS -->
<script type="module" src="./assets/js/inventory.js"></script>

</body>
</html>
