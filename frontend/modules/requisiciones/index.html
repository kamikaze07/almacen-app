<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Requisiciones</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#D32F2F',
            secondary: '#7B1FA2'
          }
        }
      }
    }
  </script>

  <style>
    #modal-requisicion {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background-color: rgba(0,0,0,0.6);
      z-index: 9999;
    }

    #modal-requisicion.open {
      display: flex;
    }

    #product-suggestions {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #374151;
    }
  </style>
</head>

<body class="bg-[#0f172a] text-white hidden">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside id="sidebar"></aside>

  <!-- Main -->
  <main class="flex-1 p-6">

    <h1 class="text-2xl font-semibold mb-6">Requisiciones</h1>

    <!-- Fecha -->
    <div class="mb-6">
      <label class="block text-sm mb-2">Selecciona una Fecha</label>
      <input type="date" id="fecha"
        class="p-3 bg-gray-800 border border-gray-700 rounded-lg w-full" />
    </div>

    <!-- Botón -->
    <button id="nueva-requisicion-btn"
      class="px-4 py-2 bg-blue-600 rounded-lg mb-6">
      Nueva Requisición
    </button>

    <!-- Tabla -->
    <table class="w-full table-fixed bg-gray-900 text-gray-400 rounded-lg border border-gray-800">
      <thead class="bg-gray-800 text-sm">
        <tr>
          <th class="p-3 w-1/3 text-left">Folio</th>
          <th class="p-3 w-1/4 text-left">Fecha</th>
          <th class="p-3 w-1/4 text-left">Solicita</th>
          <th class="p-3 w-1/5 text-left">Estatus</th>          
          <th class="p-3 w-1/6 text-right">Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla-requisiciones"></tbody>
    </table>

    <!-- MODAL -->
    <div id="modal-requisicion">
      <div class="bg-gray-900 w-full max-w-3xl rounded-xl p-6 border border-gray-800">

        <div class="flex justify-between mb-4">
          <h2 class="font-semibold">Nueva Requisición</h2>
          <button id="close-modal">✖</button>
        </div>

        <form id="form-requisicion" class="space-y-4">

          <!-- Producto -->
          <input id="producto" placeholder="Buscar producto..."
            class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg" />

          <div id="product-suggestions" class="hidden bg-gray-800 mt-2 rounded"></div>

          <!-- Tabla productos -->
          <table class="w-full text-sm border border-gray-800">
            <tbody id="product-table-body"></tbody>
          </table>

          <!-- Datos -->
          <input id="solicita" placeholder="Solicita"
            class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg" />

          <!-- Firma -->
          <canvas id="firma-entrega"
            class="w-full h-32 bg-gray-700 rounded-lg"></canvas>

          <button type="button" id="clear-signature-entrega"
            class="px-4 py-2 bg-gray-600 rounded-lg">
            Limpiar firma
          </button>

          <!-- Botones -->
          <div class="flex gap-4">
            <button id="guardar-requisicion-btn"
              class="px-4 py-2 bg-blue-600 rounded-lg">
              Guardar
            </button>

            <button type="button" id="close-modal-btn"
              class="px-4 py-2 bg-gray-700 rounded-lg">
              Cancelar
            </button>
          </div>

        </form>
      </div>
    </div>

  </main>
</div>

<div id="modal-detalle" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50">
  <div class="bg-gray-900 p-6 rounded-lg w-full max-w-md text-white">

    <h2 class="mb-4 font-semibold">Detalle</h2>

    <div id="detalle-simple"></div>

    <button onclick="cerrarDetalle()" class="mt-4 bg-gray-700 px-4 py-2 rounded">
      Cerrar
    </button>
  </div>
</div>

<div id="modal-formato" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50">

  <div class="bg-white text-black w-full max-w-3xl rounded-lg p-6">

    <!-- HEADER -->
    <div class="text-center mb-4">
      <h2 class="text-red-600 font-bold">FLETES Y MATERIALES FORSIS, S.A. DE C.V.</h2>
      <p class="text-sm">Requisición de Material</p>
      <p class="text-xs">Código: FMF-FOR-ALM-003</p>
    </div>

    <div id="detalle-header" class="mb-4 text-sm"></div>

    <!-- TABLA -->
    <table class="w-full text-sm border border-gray-400">
      <thead class="bg-gray-200">
        <tr>
          <th class="p-2 border">Producto</th>
          <th class="p-2 border">Cantidad</th>
        </tr>
      </thead>
      <tbody id="detalle-productos"></tbody>
    </table>

    <!-- FIRMAS -->
    <div class="flex justify-between mt-10 text-center text-sm">

      <div>
        <p>________________________</p>
        <p>Solicita</p>
        <img id="firma-img" class="h-12 mx-auto mt-2"/>
      </div>

      <div>
        <p>________________________</p>
        <p>Recibe Compras</p>
      </div>

    </div>

    <!-- BOTONES -->
    <div class="flex justify-end gap-4 mt-6">
      <button onclick="imprimirRequisicion()" class="bg-blue-600 px-4 py-2 text-white rounded">
        Imprimir
      </button>
      <button onclick="cerrarFormato()" class="bg-gray-600 px-4 py-2 text-white rounded">
        Cerrar
      </button>
    </div>

  </div>
</div>

<script type="module">
  import { checkAuth, setupLogout } from "/assets/js/core/auth.js";
  import { renderSidebar } from "/assets/js/components/sidebar.js";

  document.addEventListener('DOMContentLoaded', async () => {
    await checkAuth();
    document.getElementById('sidebar').innerHTML = renderSidebar("requisiciones");
    setupLogout();
    document.body.classList.remove("hidden");
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
<script type="module" src="/modules/requisiciones/assets/js/requisiciones.js"></script>

</body>
</html>
