<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Almacén</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900">

  <div class="min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-md">

      <!-- Branding -->
      <div class="text-center mb-8">
        <div class="flex justify-center">
        <img src="/frontend/assets/logo.png" alt="Forsis" class="w-20 h-20 object-contain">
        </div>
        <h1 class="mt-4 text-2xl font-bold text-white">Almacén</h1>
        <p class="text-sm text-gray-400">Sistema de gestión</p>
      </div>

      <!-- Card -->
      <div class="border-t-4 bg-gray-800 border border-gray-700 backdrop-blur-xl border border-gray-700 rounded-2xl shadow-2xl p-8">

        <h2 class="text-xl font-semibold text-white mb-1">
          Bienvenido
        </h2>
        <p class="text-sm text-gray-400 mb-6">
          Inicia sesión para continuar
        </p>

        <!-- FORM -->
        <div class="bg-gray-900/60 rounded-xl p-6 border border-gray-700">

      <!-- Form -->
      <form id="loginForm" class="space-y-5">

        <!-- Usuario -->
        <div>
          <label class="text-sm font-medium text-gray-300">Usuario</label>
          <input
            type="text"
            id="usuario"
            autofocus
            placeholder="Ingresa tu usuario"
            class="w-full mt-1 px-4 py-2 bg-gray-800 border border-gray-600 text-white rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 focus:outline-none transition"
            required
          >
        </div>

        <!-- Password -->
        <div>
          <label class="text-sm font-medium text-gray-300">Contraseña</label>

          <div class="relative">
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              class="w-full mt-1 px-4 py-2 bg-gray-800 border border-gray-600 text-white rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 focus:outline-none transition"
              required
            >

            <button
            type="button"
            id="togglePassword"
            class="absolute right-3 top-3 text-gray-400 hover:text-white transition"
            >
            👁
            </button>
          </div>
        </div>

        <!-- Botón -->
        <button
        type="submit"
        id="loginBtn"
        class="w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-500 active:scale-[0.98] transition font-medium flex items-center justify-center gap-2 shadow-lg"
        >
        <span id="btnText">Iniciar sesión</span>
        <span id="loader" class="hidden animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"></span>
        </button>

        <!-- Error -->
        <p id="error" class="text-red-500 text-sm text-center hidden"></p>

      </form>

      </div>

        </div>

    </div>

  </div>
  <script src="/frontend/assets/js/login.js"></script>
</body>
</html>
